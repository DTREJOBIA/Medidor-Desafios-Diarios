<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Medidor BIA HN</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #132c55;
}

.container {
  max-width: 900px;
  margin: auto;
  background: #d2b89c;
  border-radius: 20px;
  padding: 25px;
  margin-top: 30px;
}

h1 {
  text-align: center;
  color: #132c55;
}

.ruta-box {
  text-align: center;
  margin-bottom: 20px;
}

.ruta-box input {
  padding: 8px;
  width: 150px;
  text-align: center;
  border-radius: 8px;
  border: 1px solid #999;
  font-weight: bold;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #e8dccf;
}

th {
  background: #132c55;
  color: white;
  padding: 12px;
}

td {
  padding: 12px;
  text-align: center;
  border: 1px solid #bda88f;
  font-weight: bold;
}

input[type="number"] {
  width: 80px;
  padding: 5px;
  text-align: center;
  border-radius: 6px;
  border: 1px solid #999;
}

.resumen-box {
  margin-top: 15px;
  background: #132c55;
  color: white;
  padding: 15px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

.valor {
  background: #e8dccf;
  color: #132c55;
  padding: 6px 15px;
  border-radius: 8px;
}

.mensaje {
  margin-top: 20px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

.rojo { color: #d32f2f; }
.amarillo { color: #f9a825; }
.verde { color: #2e7d32; }

</style>
</head>

<body>

<div class="container">

<h1>MEDIDOR DE DESAFÍOS DIARIOS BIA HN</h1>

<div class="ruta-box">
  Ruta: <input type="text" id="ruta" placeholder="Ej: 305">
</div>

<table>
<thead>
<tr>
<th>INDICADOR</th>
<th>NECESIDAD</th>
<th>REAL</th>
<th>%</th>
</tr>
</thead>

<tbody>

<tr>
<td>Venta Neta Café</td>
<td><input type="number" id="nec-cafe" oninput="calc()"></td>
<td><input type="number" id="real-cafe" oninput="calc()"></td>
<td id="pct-cafe">0%</td>
</tr>

<tr>
<td>Venta Neta Representadas</td>
<td><input type="number" id="nec-rep" oninput="calc()"></td>
<td><input type="number" id="real-rep" oninput="calc()"></td>
<td id="pct-rep">0%</td>
</tr>

<tr>
<td>Cobertura Innovaciones</td>
<td><input type="number" id="nec-inn" oninput="calc()"></td>
<td><input type="number" id="real-inn" oninput="calc()"></td>
<td id="pct-inn">0%</td>
</tr>

<tr>
<td>Cobertura Blends</td>
<td><input type="number" id="nec-blend" oninput="calc()"></td>
<td><input type="number" id="real-blend" oninput="calc()"></td>
<td id="pct-blend">0%</td>
</tr>

<tr>
<td>Efectividad de Compra</td>
<td><input type="number" id="nec-efec" oninput="calc()"></td>
<td><input type="number" id="real-efec" oninput="calc()"></td>
<td id="pct-efec">0%</td>
</tr>

</tbody>
</table>

<div class="resumen-box">
  <div>Ventas Netas</div>
  <div class="valor" id="ventas">0%</div>
</div>

<div class="resumen-box">
  <div>Coberturas</div>
  <div class="valor" id="coberturas">0%</div>
</div>

<div class="mensaje" id="mensaje"></div>

</div>

<script>

function color(el, val){
  el.classList.remove('rojo','amarillo','verde');

  if(val < 70) el.classList.add('rojo');
  else if(val <= 85) el.classList.add('amarillo');
  else el.classList.add('verde');
}

function calc(){

  const g = id => parseFloat(document.getElementById(id).value) || 0;

  let pc = g("nec-cafe") ? (g("real-cafe")/g("nec-cafe"))*100 : 0;
  let pr = g("nec-rep") ? (g("real-rep")/g("nec-rep"))*100 : 0;
  let pi = g("nec-inn") ? (g("real-inn")/g("nec-inn"))*100 : 0;
  let pb = g("nec-blend") ? (g("real-blend")/g("nec-blend"))*100 : 0;
  let pe = g("nec-efec") ? (g("real-efec")/g("nec-efec"))*100 : 0;

  function set(id,val){
    let el = document.getElementById(id);
    el.innerText = val.toFixed(1)+"%";
    color(el,val);
  }

  set("pct-cafe", pc);
  set("pct-rep", pr);
  set("pct-inn", pi);
  set("pct-blend", pb);
  set("pct-efec", pe);

  let ventas = (pc + pr)/2;
  let coberturas = (pi + pb)/2;

  set("ventas", ventas);
  set("coberturas", coberturas);

  let msg = document.getElementById("mensaje");

  if (ventas < 70 || coberturas < 70) {
    msg.textContent = "⚠️ Estás abajo de la meta, debes reaccionar ya.";
    msg.style.color = "#d32f2f";
  }
  else if (ventas <= 85 || coberturas <= 85) {
    msg.textContent = "🟡 Vas en desarrollo, aún puedes cerrar fuerte.";
    msg.style.color = "#f9a825";
  }
  else {
    msg.textContent = "🔥 Excelente ejecución, estás arriba del 85%.";
    msg.style.color = "#2e7d32";
  }

}

</script>

</body>
</html>
